version: 2

models:
  - name: fct_orders
    description: "One row per order containing payment, delivery, and review metrics"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Surrogate key linking the customer to this specific order"
        tests:
          - not_null
      - name: customer_unique_id
        description: "True unique customer identifier — foreign key to dim_customers"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_unique_id
      - name: customer_city
        description: "City of the customer"
      - name: customer_state
        description: "State of the customer"
      - name: order_status
        description: "Current status of the order"
        tests:
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable',
                         'invoiced', 'processing', 'created', 'approved']
      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed"
        tests:
          - not_null
      - name: order_approved_at
        description: "Timestamp when the payment was approved"
      - name: order_delivered_customer_date
        description: "Timestamp when the customer received the order"
      - name: order_estimated_delivery_date
        description: "Estimated delivery date shown to the customer at purchase time"
      - name: total_payment_value
        description: "Total amount paid for the order including freight"
      - name: payment_type
        description: "Primary payment method used for the order"
      - name: payment_count
        description: "Number of payment methods used for the order"
      - name: max_installments
        description: "Maximum number of installments used across all payment methods"
      - name: total_items
        description: "Total number of items in the order"
      - name: total_price
        description: "Sum of item prices (excluding freight) in BRL"
      - name: total_freight
        description: "Sum of freight costs for the order in BRL"
      - name: total_order_value
        description: "Total order value including freight in BRL"
      - name: review_score
        description: "Customer satisfaction score from 1 (worst) to 5 (best)"
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
      - name: review_comment_title
        description: "Title of the most recent customer review"
      - name: delivery_days
        description: "Number of days from purchase to delivery"
      - name: days_early_or_late
        description: "Positive = delivered early, negative = delivered late (relative to estimated date)"
      - name: delivery_status
        description: "Whether the order was On Time or Late relative to the estimated delivery date"
        tests:
          - accepted_values:
              arguments:
                values: ['On Time', 'Late']

  - name: dim_customers
    description: "One row per unique customer with lifetime value and segmentation"
    columns:
      - name: customer_unique_id
        description: "True unique identifier for each customer across all orders"
        tests:
          - unique
          - not_null
      - name: customer_city
        description: "Most recent city associated with the customer"
      - name: customer_state
        description: "Most recent state associated with the customer"
      - name: total_orders
        description: "Total number of orders placed by the customer"
        tests:
          - not_null
      - name: first_order_date
        description: "Timestamp of the customer's first order"
      - name: last_order_date
        description: "Timestamp of the customer's most recent order"
      - name: lifetime_value
        description: "Total revenue generated by the customer across all orders in BRL"
      - name: avg_order_value
        description: "Average order value for the customer in BRL"
      - name: customer_age_days
        description: "Days between the customer's first and most recent order"
      - name: customer_segment
        description: "Frequency-based segment: Champion (5+ orders), Loyal (3-4), Returning (2), One Time (1)"
        tests:
          - accepted_values:
              arguments:
                values: ['Champion', 'Loyal', 'Returning', 'One Time']
      - name: ltv_segment
        description: "LTV-based segment: High Value (>=1000 BRL), Mid Value (>=300 BRL), Low Value (<300 BRL)"
        tests:
          - accepted_values:
              arguments:
                values: ['High Value', 'Mid Value', 'Low Value']

  - name: fct_order_items
    description: "One row per order item with product and category details"
    columns:
      - name: order_id
        description: "Foreign key to fct_orders"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: order_item_id
        description: "Sequential item number within the order"
        tests:
          - not_null
      - name: seller_id
        description: "Foreign key to dim_sellers"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_id
      - name: product_id
        description: "Unique identifier for the product"
      - name: product_category_name
        description: "Product category in Portuguese"
      - name: product_category_name_english
        description: "English translation of the product category"
      - name: price
        description: "Item price in BRL"
        tests:
          - not_null
      - name: freight_value
        description: "Freight cost for this item in BRL"
      - name: total_item_value
        description: "price + freight_value — total cost of this item to the customer"
      - name: product_weight_g
        description: "Product weight in grams"
      - name: order_status
        description: "Status of the order this item belongs to"
      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed"
      - name: customer_id
        description: "Customer who placed this order"
      - name: freight_pct_of_price
        description: "Freight cost as a percentage of the item price"

  - name: dim_sellers
    description: "One row per seller with revenue and performance metrics"
    columns:
      - name: seller_id
        description: "Unique identifier for each seller"
        tests:
          - unique
          - not_null
      - name: seller_city
        description: "City where the seller is located"
      - name: seller_state
        description: "State where the seller is located"
      - name: total_orders
        description: "Total number of distinct orders fulfilled by the seller"
      - name: total_items_sold
        description: "Total number of individual items sold by the seller"
      - name: total_revenue
        description: "Total revenue generated by the seller (sum of item prices, excluding freight) in BRL"
        tests:
          - not_null
      - name: avg_item_price
        description: "Average price per item sold by the seller in BRL"
      - name: total_freight_charged
        description: "Total freight value charged across all the seller's items in BRL"
      - name: first_sale_date
        description: "Timestamp of the seller's first sale"
      - name: last_sale_date
        description: "Timestamp of the seller's most recent sale"
      - name: seller_tier
        description: "Revenue-based tier: Platinum (>=50k BRL), Gold (>=20k), Silver (>=5k), Bronze (<5k)"
        tests:
          - accepted_values:
              arguments:
                values: ['Platinum', 'Gold', 'Silver', 'Bronze']

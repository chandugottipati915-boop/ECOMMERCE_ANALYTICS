version: 2

models:
  - name: stg_customers
    description: "Cleaned customers data from the raw Olist source"
    columns:
      - name: customer_id
        description: "Surrogate key linking a customer to a specific order (not globally unique)"
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "True unique identifier for a customer across all orders"
        tests:
          - not_null
      - name: customer_zip_code_prefix
        description: "First 5 digits of the customer zip code"
      - name: customer_city
        description: "Customer city name"
      - name: customer_state
        description: "Customer state abbreviation (2-letter)"

  - name: stg_orders
    description: "Cleaned orders data from the raw Olist source"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable',
                         'invoiced', 'processing', 'created', 'approved']
      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed"
        tests:
          - not_null
      - name: order_approved_at
        description: "Timestamp when the payment was approved"
      - name: order_delivered_carrier_date
        description: "Timestamp when the order was handed to the carrier"
      - name: order_delivered_customer_date
        description: "Timestamp when the customer received the order"
      - name: order_estimated_delivery_date
        description: "Estimated delivery date shown to the customer at purchase time"

  - name: stg_order_items
    description: "Cleaned order items data — one row per item within an order"
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: order_item_id
        description: "Sequential item number within the order"
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to stg_products"
        tests:
          - not_null
      - name: seller_id
        description: "Foreign key to stg_sellers"
        tests:
          - not_null
      - name: shipping_limit_date
        description: "Deadline for the seller to hand the item to the carrier"
      - name: price
        description: "Item price in BRL"
        tests:
          - not_null
      - name: freight_value
        description: "Freight cost for this item in BRL"
      - name: total_item_value
        description: "price + freight_value — total cost of the item to the customer"

  - name: stg_order_payments
    description: "Cleaned order payments data — one row per payment method per order"
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: payment_sequential
        description: "Sequence number when multiple payment methods are used"
        tests:
          - not_null
      - name: payment_type
        description: "Payment method used"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['boleto', 'credit_card', 'voucher', 'debit_card', 'not_defined']
      - name: payment_installments
        description: "Number of installments chosen by the customer"
      - name: payment_value
        description: "Transaction value for this payment in BRL"
        tests:
          - not_null

  - name: stg_order_reviews
    description: "Cleaned order reviews data from the raw Olist source"
    columns:
      - name: review_id
        description: "Unique identifier for each review"
        tests:
          - not_null
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: review_score
        description: "Customer satisfaction score from 1 (worst) to 5 (best)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
      - name: review_comment_title
        description: "Title of the review comment left by the customer"
      - name: review_comment_message
        description: "Body of the review comment left by the customer"
      - name: review_creation_date
        description: "Date the review survey was sent to the customer"
      - name: review_answer_timestamp
        description: "Timestamp when the customer submitted the review"

  - name: stg_products
    description: "Cleaned products data from the raw Olist source"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: "Product category in Portuguese"
      - name: product_name_length
        description: "Number of characters in the product name"
      - name: product_description_length
        description: "Number of characters in the product description"
      - name: product_photos_qty
        description: "Number of photos published for the product"
      - name: product_weight_g
        description: "Product weight in grams"
      - name: product_length_cm
        description: "Product length in centimeters"
      - name: product_height_cm
        description: "Product height in centimeters"
      - name: product_width_cm
        description: "Product width in centimeters"

  - name: stg_sellers
    description: "Cleaned sellers data from the raw Olist source"
    columns:
      - name: seller_id
        description: "Unique identifier for each seller"
        tests:
          - unique
          - not_null
      - name: seller_zip_code_prefix
        description: "First 5 digits of the seller zip code"
      - name: seller_city
        description: "Seller city name"
      - name: seller_state
        description: "Seller state abbreviation (2-letter)"

  - name: stg_geolocation
    description: "Geolocation data mapping zip code prefixes to lat/lng coordinates"
    columns:
      - name: geolocation_zip_code_prefix
        description: "First 5 digits of the zip code"
        tests:
          - not_null
      - name: geolocation_lat
        description: "Latitude coordinate"
      - name: geolocation_lng
        description: "Longitude coordinate"
      - name: geolocation_city
        description: "City name for this zip code"
      - name: geolocation_state
        description: "State abbreviation for this zip code"

  - name: stg_product_category_translations
    description: "Lookup table mapping Portuguese product category names to English"
    columns:
      - name: product_category_name
        description: "Product category name in Portuguese (primary key)"
        tests:
          - unique
          - not_null
      - name: product_category_name_english
        description: "English translation of the product category name"
